name: Daily Report Cron

on:
  schedule:
    # 08:45 BRT (America/Sao_Paulo = UTC-3) = 11:45 UTC
    # Formato: minuto hora dia-do-mês mês dia-da-semana
    # Executar Segunda a Sexta às 08:45 BRT
    - cron: '45 11 * * 1-5'
  
  # Permite executar manualmente pelo GitHub Actions UI
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scheduled report
        run: python main.py --scheduled-report
        env:
          MOVIDESK_TOKEN: ${{ secrets.MOVIDESK_TOKEN }}
          MOVIDESK_BASE_URL: ${{ secrets.MOVIDESK_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          AGENTS: ${{ secrets.AGENTS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          LOG_LEVEL: INFO
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: execution-logs
          path: logs/
          retention-days: 7
